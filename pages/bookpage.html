<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">	
	<title>DeBokton Book</title>
	<link rel="icon" href="../pics/phoenix.jpg">
	<link rel="Stylesheet" href="dbbooks.css">
</head>

<body>
	<div id="top"></div>
	<iframe class="headsUp" src="header.html" width="100%" height="65" frameborder="0" scrolling="no"></iframe>
	
	<div class="jumptostripe">		
		<a href="#top" class="jumpto"><h4>Novels</h4></a>
		<a href="#quick" class="jumpto"><h4>Quick Reads</h4></a>
		<a href="#kids" class="jumpto"><h4>Picture Books</h4></a>
		<a href="#audio" class="jumpto"><h4>Audio Books</h4></a>
	</div>

						<!--Section 1-->
<section class="section1" id="novels">
		<img src="../pics/bannerbooknov2.png" alt="novel banner">
</section>


<section class="explain">
	<h2>Click on any book or series to go to the book's page for details.</h2>
</section>

						<!--Novel List-->

	<section class="booklist">
		<div class="novellist">
			<h2>Novels</h2>
			<hr>
			<div class="trilist"></div>
			<div class="bilist"></div>
			<div class="monlist"></div>
		</div>
	</section>

						<!--Section 2-->
	
<section id="quick" class="section2" id="quickreads">
		<img src="../pics/bannerbookquick.png" alt="Young Reader banner">
</section>

						<!--Young Reader List-->

	<section class="booklist">
		<div class="shortlist">
			<h2>Light Novels and Young Reader Series</h2>
			<hr>
		</div>
	</section>

						<!--Section 3-->					
	
<section id="kids" class="section2" id="picturebooks">
		<img src="../pics/bannerbookkids.png" alt="Children's banner">
</section>

						<!--Children's Picture Books List-->

	<section class="booklist">
		<div class="picturelist">
			<h2>Children's Picture Books</h2>
			<hr>
		</div>
	</section>

						<!--Section 4-->
<section class="section2" id="nonfic">
		<img src="../pics/bannerbookmore.png" alt="Educational and Audio banner">
</section>

						<!--Educational, Non-Fiction List-->

	<section class="booklist">
		<div class="edulist">
			<h2>Educational Books</h2>
			<hr>
		</div>
	</section>
	
						<!--Section 5-->

													
<section id="audio" class="section2" id="aubooks">
		<img src="../pics/bannerbookaudio.png" alt="Educational and Audio banner">
</section>

						<!--Audio List-->

	<section class="booklist">
		<div class="audiolist">
			<h2>Audiobooks</h2>
			<hr>
		</div>
	</section>
		
		
						<!--Footer-->
	<div class="jumptostripe">
		<a href="#top" class="jumpto"><h4>Back to Top</h4></a>
	</div>
	
	<iframe class="headsUp" src="footer.html" width="100%" height="60" frameborder="0" scrolling="no"></iframe>

	<script src="data.js"></script>
	<script src="bookpage.js"></script>

</body>
</html>
