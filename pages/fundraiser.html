<!doctype HTML>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>DeBokton Book</title>
		<link rel="icon" href="./pics/phoenix.jpg">
		<link rel="Stylesheet" href="../pages/dbstyles.css">
		<link rel="Stylesheet" href="../pages/form.css">
	</head>

<body>
							<!--Header-->
	<iframe class="headsUp" src="header.html" width="100%" height="65" frameborder="0" scrolling="no"></iframe>

							<!--Banner-->
	<section class="banner">
		<img src="../pics/bannerfundraiser.png" alt="Fundraiser Banner">
	</section>


	<h1 class="fundtitle">Fundraiser Group Here</h1>

	<section class="fundpage">
		<img src="../pics/fundraisergroup.png" alt="Fundraising Group Picture">
		<div class="fundexplain">
			<h2>Explain what the Fundraiser is for here!</h2>
			<p>Here put the pitch to convince people that they want to help the fundraising organization. 
			Don't worry, Amazon will not report information about you or your purchase to us.</p>
		</div>
		<div class="joinlist">
			<form autocomplete="off" method="POST" action="insert.php">
			<h2>Join our mailing list.</h2>
				<label for="name" class="icon"><img src="../pics/iconperson.png" alt="Person Icon" width="30px"></label>
					<input id="name" name="name" placeholder="Name"></input><br>
				<label for="email_address" class="icon"><img src="../pics/iconenvelope.png" alt="Email Icon" width="30px"></label>
					<input id="email_address" name="email_address" required placeholder="Email"></input><br>
				<input class="subbutton" id="submit" name="submit" type="submit" value="submit"></input>
			</form>
		</div>
	</section>

	
	
	
						<!--Footer-->
		<iframe class="headsUp" src="../pages/footer.html" width="100%" height="60" frameborder="0" scrolling="no"></iframe>
					
</body>
</html>
